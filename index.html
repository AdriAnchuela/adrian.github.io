<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adrian Anchuela</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ── TOKENS ── */
:root {
  --bg:    #080a0d;
  --bg2:   #0d1017;
  --line:  rgba(255,255,255,0.07);
  --muted: rgba(255,255,255,0.35);
  --text:  rgba(255,255,255,0.92);
  --accent:#4af0c4;
  --accent2:#f0a84a;
  --mono:  'JetBrains Mono', monospace;
  --display: 'Clash Display', 'Satoshi', sans-serif;
  --body: 'Satoshi', sans-serif;
}

/* ── RESET ── */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; font-size:16px; }
body {
  background:var(--bg);
  color:var(--text);
  font-family:var(--body);
  cursor:none;
  overflow-x:hidden;
}
a { color:inherit; text-decoration:none; }
::selection { background:var(--accent); color:#000; }
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); }

/* ── CURSOR ── */
#cur, #cur-ring {
  position:fixed; top:0; left:0;
  border-radius:50%; pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
}
#cur { width:8px; height:8px; background:var(--accent); transition:width .15s,height .15s,background .2s; }
#cur-ring {
  width:32px; height:32px;
  border:1px solid rgba(74,240,196,.4);
  z-index:9998;
  transition:transform .2s ease, width .2s, height .2s, opacity .2s;
  opacity:.6;
}
#cur.big { width:14px; height:14px; }
#cur-ring.big { width:50px; height:50px; opacity:.3; }

/* ── NAV ── */
nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:1.6rem 3rem;
  mix-blend-mode: normal;
}
.nav-logo {
  font-family:var(--mono); font-size:.72rem; letter-spacing:.12em;
  color:var(--muted); cursor:none; user-select:none;
}
.nav-logo b { color:var(--text); font-weight:400; }
.nav-right { display:flex; gap:2.5rem; align-items:center; }
.nav-link {
  font-family:var(--mono); font-size:.68rem; letter-spacing:.1em;
  color:var(--muted); cursor:none; transition:color .2s;
  text-transform:uppercase;
}
.nav-link:hover { color:var(--text); }
.lang-btn {
  font-family:var(--mono); font-size:.68rem; letter-spacing:.1em;
  background:none; border:1px solid var(--line); color:var(--muted);
  padding:.3rem .75rem; border-radius:2px; cursor:none;
  transition:all .2s;
}
.lang-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── HERO ── */
#hero {
  min-height:100vh;
  display:flex; flex-direction:column; justify-content:center;
  padding:8rem 3rem 4rem;
  position:relative; overflow:hidden;
}
.hero-bg-text {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:clamp(120px,20vw,260px); font-weight:700;
  letter-spacing:-.04em; line-height:1;
  color:rgba(255,255,255,.018);
  white-space:nowrap; user-select:none; pointer-events:none;
  font-family:'Clash Display', sans-serif;
}
.hero-availability {
  font-family:var(--mono); font-size:.68rem; letter-spacing:.18em;
  color:var(--accent); text-transform:uppercase;
  display:flex; align-items:center; gap:.6rem;
  margin-bottom:2rem;
}
.hero-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:blink 2s ease infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.hero-name {
  font-size:clamp(56px,10vw,130px); font-weight:700;
  letter-spacing:-.04em; line-height:.9;
  margin-bottom:2.5rem;
  cursor:none;
  font-family:'Clash Display', sans-serif;
}
.hero-name .line2 { color:var(--accent); }
.hero-bottom {
  display:flex; align-items:flex-end; justify-content:space-between;
  flex-wrap:wrap; gap:2rem;
  border-top:1px solid var(--line); padding-top:2rem;
}
.hero-desc {
  font-family:var(--mono); font-size:.82rem; color:var(--muted);
  line-height:1.7; max-width:380px;
}
.hero-desc strong { color:var(--text); font-weight:400; }
.hero-actions { display:flex; gap:1rem; align-items:center; flex-wrap:wrap; }
.btn-solid {
  padding:.7rem 1.8rem;
  background:var(--accent); color:#000; font-family:var(--mono);
  font-size:.72rem; font-weight:700; letter-spacing:.12em;
  border:none; border-radius:2px; cursor:none;
  text-transform:uppercase; transition:all .2s;
  text-decoration:none;
}
.btn-solid:hover { background:#fff; transform:translateY(-2px); }
.btn-ghost {
  padding:.7rem 1.8rem;
  background:transparent; color:var(--text); font-family:var(--mono);
  font-size:.72rem; letter-spacing:.12em;
  border:1px solid var(--line); border-radius:2px; cursor:none;
  text-transform:uppercase; transition:all .2s;
  text-decoration:none;
}
.btn-ghost:hover { border-color:var(--text); transform:translateY(-2px); }
.hero-meta {
  display:flex; flex-direction:column; align-items:flex-end; gap:.3rem;
}
.hero-meta-item { font-family:var(--mono); font-size:.65rem; color:var(--muted); letter-spacing:.08em; }
.hero-meta-item span { color:var(--text); }

/* ── MARQUEE ── */
.marquee-wrap {
  border-top:1px solid var(--line); border-bottom:1px solid var(--line);
  overflow:hidden; padding:.9rem 0; background:var(--bg2);
}
.marquee-track {
  display:flex; gap:0;
  animation:marquee 24s linear infinite;
  width:max-content;
}
@keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.marquee-item {
  font-family:var(--mono); font-size:.72rem; letter-spacing:.12em;
  color:var(--muted); white-space:nowrap;
  padding:0 2.5rem;
  display:flex; align-items:center; gap:2.5rem;
}
.marquee-item::after {
  content:'◆'; font-size:.4rem; color:var(--accent); opacity:.6;
}

/* ── SECTION BASE ── */
.section { padding:7rem 3rem; max-width:1200px; margin:0 auto; }
.section-full { padding:7rem 3rem; border-top:1px solid var(--line); }
.section-full .inner { max-width:1200px; margin:0 auto; }
.sec-tag {
  font-family:var(--mono); font-size:.62rem; letter-spacing:.25em;
  color:var(--muted); text-transform:uppercase; margin-bottom:1.2rem;
  display:flex; align-items:center; gap:.8rem;
}
.sec-tag::before { content:''; width:20px; height:1px; background:var(--muted); }
.sec-h {
  font-size:clamp(2rem,5vw,4rem); font-weight:700;
  letter-spacing:-.03em; line-height:1.05;
  margin-bottom:.8rem;
  font-family:'Clash Display', sans-serif;
}

/* ── ABOUT ── */
.about-grid { display:grid; grid-template-columns:1fr 1fr; gap:6rem; align-items:start; }
.about-para { color:var(--muted); font-size:1.05rem; line-height:1.9; margin-bottom:1.4rem; font-family:var(--mono); font-size:.88rem; }
.about-para strong { color:var(--text); font-weight:400; }
.about-code-block {
  background:var(--bg2); border:1px solid var(--line);
  border-radius:4px; overflow:hidden;
}
.code-header { padding:.6rem 1rem; background:rgba(255,255,255,.03); border-bottom:1px solid var(--line); display:flex; align-items:center; gap:.5rem; }
.code-dot { width:10px; height:10px; border-radius:50%; }
.code-body { padding:1.4rem; font-family:var(--mono); font-size:.75rem; line-height:2; }
.kw{color:#c792ea} .fn{color:var(--accent)} .str{color:#c3e88d} .cm{color:rgba(255,255,255,.25);font-style:italic} .num{color:var(--accent2)}

/* ── PROJECTS ── */
.projects-list { display:flex; flex-direction:column; }
.project-row {
  display:grid; grid-template-columns:80px 1fr auto;
  align-items:center; gap:3rem;
  padding:2.2rem 0;
  border-bottom:1px solid var(--line);
  cursor:none; transition:all .25s; position:relative;
  overflow:hidden;
  flex-wrap:wrap;
}
.project-row::before {
  content:'';
  position:absolute; left:-100%; top:0; bottom:0; width:100%;
  background:linear-gradient(90deg,transparent,rgba(74,240,196,.04),transparent);
  transition:left .4s ease;
}
.project-row:hover::before { left:100%; }
.project-row:hover .proj-num { color:var(--accent); }
.project-row:hover .proj-title { letter-spacing:-.01em; }
.proj-num { font-family:var(--mono); font-size:.68rem; color:var(--line); letter-spacing:.1em; transition:color .2s; }
.proj-center {}
.proj-title { font-size:clamp(1.4rem,3vw,2.5rem); font-weight:700; letter-spacing:-.03em; line-height:1; margin-bottom:.5rem; transition:all .2s; font-family:'Clash Display',sans-serif; }
.proj-client { font-family:var(--mono); font-size:.68rem; color:var(--accent2); letter-spacing:.1em; margin-bottom:.6rem; }
.proj-desc { font-family:var(--mono); font-size:.72rem; color:var(--muted); line-height:1.7; max-width:520px; }
.proj-chips { display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.8rem; }
.chip {
  font-family:var(--mono); font-size:.6rem; letter-spacing:.08em;
  padding:.2rem .6rem; border:1px solid var(--line); border-radius:2px; color:var(--muted);
}
.proj-arrow { font-family:var(--mono); font-size:.7rem; color:var(--muted); white-space:nowrap; }
.project-row:hover .proj-arrow { color:var(--accent); }

/* Featured project (first) */
.project-row.featured {
  grid-template-columns:80px 1fr 1fr;
  padding:3rem 0;
  align-items:start;
}
.project-row.expanded .proj-detail {
  max-height: 1500px; opacity: 1; padding-top: 1.5rem;
}
.proj-detail {
  grid-column: 1 / -1;
  max-height: 0; opacity: 0;
  overflow: hidden;
  transition: max-height .6s cubic-bezier(.4,0,.2,1), opacity .35s, padding-top .35s;
}
.proj-detail-inner {
  display: grid; grid-template-columns: 1fr 2fr; gap: 3rem;
  padding: 2rem 0 1rem;
  border-top: 1px solid var(--line);
}
.proj-detail-label {
  font-family: var(--mono); font-size: .6rem;
  letter-spacing: .2em; color: var(--muted);
  text-transform: uppercase; margin-bottom: .8rem;
}
.proj-problem {
  font-family: var(--mono); font-size: .78rem;
  color: var(--muted); line-height: 1.85;
}
.proj-problem strong { color: var(--text); font-weight: 400; }
.proj-arch-list {
  list-style: none; display: flex; flex-direction: column; gap: .9rem;
}
.proj-arch-list li {
  font-family: var(--mono); font-size: .78rem;
  color: var(--muted); line-height: 1.75;
  padding-left: 1.6rem; position: relative;
}
.proj-arch-list li::before {
  content: '→'; position: absolute; left: 0; top: 0;
  color: var(--accent);
}
.proj-arch-list li strong { color: var(--text); font-weight: 400; }
.proj-tag-row { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: 1.5rem; }
.proj-tag-row .chip { color: var(--accent); border-color: rgba(74,240,196,.3); }
.project-row.expanded .proj-arrow { color: var(--accent); transform: rotate(90deg); }
.proj-arrow { transition: transform .3s, color .2s; }
@media(max-width:900px){
  .proj-detail-inner { grid-template-columns: 1fr; gap: 1.5rem; }
}
.proj-badge {
  font-family:var(--mono); font-size:.55rem; letter-spacing:.15em;
  background:var(--accent); color:#000; padding:.2rem .6rem; border-radius:2px;
  display:inline-block; margin-bottom:.8rem;
}

/* ── EXPERIENCE ── */
.exp-grid { display:grid; grid-template-columns:280px 1fr; gap:5rem; }
.exp-index { display:flex; flex-direction:column; gap:.4rem; }
.exp-index-item {
  font-family:var(--mono); font-size:.72rem; color:var(--muted);
  padding:.5rem 0; border-bottom:1px solid transparent;
  cursor:none; transition:all .2s; letter-spacing:.06em;
}
.exp-index-item.active { color:var(--text); border-bottom-color:var(--accent); }
.exp-item { display:none; }
.exp-item.active { display:block; }
.exp-role { font-size:2rem; font-weight:700; letter-spacing:-.03em; margin-bottom:.4rem; font-family:'Clash Display',sans-serif; }
.exp-co { font-family:var(--mono); font-size:.78rem; color:var(--accent); letter-spacing:.1em; margin-bottom:.4rem; }
.exp-date { font-family:var(--mono); font-size:.65rem; color:var(--muted); letter-spacing:.1em; margin-bottom:1.8rem; }
.exp-bullets { list-style:none; display:flex; flex-direction:column; gap:.7rem; }
.exp-bullets li { 
  font-family:var(--mono); font-size:.8rem; color:var(--muted); 
  line-height:1.7; padding-left:1.4rem; position:relative;
}
.exp-bullets li::before { content:'→'; position:absolute; left:0; color:var(--accent); }

/* ── EDUCATION ── */
.edu-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
.edu-card {
  padding:2rem; border:1px solid var(--line); border-radius:4px;
  transition:border-color .2s;
  position:relative; overflow:hidden;
}
.edu-card:hover { border-color:rgba(74,240,196,.3); }
.edu-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0; transition:opacity .3s;
}
.edu-card:hover::before { opacity:1; }
.edu-deg { font-size:1.15rem; font-weight:600; letter-spacing:-.02em; margin-bottom:.4rem; font-family:'Clash Display',sans-serif; }
.edu-school { font-family:var(--mono); font-size:.7rem; color:var(--accent); letter-spacing:.1em; margin-bottom:.3rem; }
.edu-yr { font-family:var(--mono); font-size:.62rem; color:var(--muted); margin-bottom:.8rem; }
.edu-note { font-family:var(--mono); font-size:.7rem; color:var(--muted); line-height:1.7; }

/* ── CONTACT ── */
#contact { background:var(--bg2); }
.contact-inner { max-width:1200px; margin:0 auto; padding:8rem 3rem; }
.contact-pre { font-family:var(--mono); font-size:.72rem; color:var(--muted); letter-spacing:.2em; text-transform:uppercase; margin-bottom:1.5rem; display:flex; align-items:center; gap:.8rem; }
.contact-pre::before { content:''; width:20px; height:1px; background:var(--muted); }
.contact-cta {
  font-size:clamp(2.5rem,7vw,7rem); font-weight:700;
  letter-spacing:-.04em; line-height:.95;
  margin-bottom:3rem;
  font-family:'Clash Display', sans-serif;
}
.contact-cta .accent { color:var(--accent); }
.contact-cta a { cursor:none; transition:opacity .2s; }
.contact-cta a:hover { opacity:.7; }
.contact-row { display:flex; justify-content:space-between; align-items:flex-end; border-top:1px solid var(--line); padding-top:2rem; flex-wrap:wrap; gap:2rem; }
.contact-item { display:flex; flex-direction:column; gap:.3rem; }
.contact-label { font-family:var(--mono); font-size:.6rem; color:var(--muted); letter-spacing:.2em; text-transform:uppercase; }
.contact-val { font-family:var(--mono); font-size:.85rem; color:var(--text); }
.cv-dl {
  display:flex; align-items:center; gap:.8rem;
  font-family:var(--mono); font-size:.72rem; letter-spacing:.1em;
  border:1px solid var(--line); padding:.7rem 1.4rem; border-radius:2px;
  cursor:none; transition:all .2s; text-transform:uppercase;
}
.cv-dl:hover { border-color:var(--accent); color:var(--accent); }

/* ── FOOTER ── */
footer {
  padding:2rem 3rem;
  display:flex; justify-content:space-between; align-items:center;
  border-top:1px solid var(--line); font-family:var(--mono);
  font-size:.62rem; color:var(--muted);
  max-width:none;
}
footer span { color:var(--accent); }

/* ── SIDE LINKS ── */
.side-links { display:none; }

/* ── REVEALS ── */
.reveal { opacity:0; transform:translateY(28px); transition:opacity .7s ease, transform .7s ease; }
.reveal.in { opacity:1; transform:none; }
.reveal-d1 { transition-delay:.1s; }
.reveal-d2 { transition-delay:.2s; }
.reveal-d3 { transition-delay:.3s; }

/* ── TERMINAL EASTER EGG ── */
#term-overlay {
  position:fixed; inset:0; z-index:10000;
  background:rgba(0,0,0,.97);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .3s;
}
#term-overlay.open { opacity:1; pointer-events:all; }
.term-win {
  width:min(680px,90vw); background:#0a0e14;
  border:1px solid var(--accent); border-radius:6px; overflow:hidden;
  box-shadow:0 0 80px rgba(74,240,196,.2);
  transform:scale(.96); transition:transform .3s;
}
#term-overlay.open .term-win { transform:scale(1); }
.term-hdr {
  padding:.6rem 1rem; background:rgba(255,255,255,.03);
  border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:.5rem;
}
.tdot { width:11px; height:11px; border-radius:50%; cursor:none; }
.term-body { padding:1.4rem; font-family:var(--mono); font-size:.78rem; line-height:1.9; color:var(--accent); min-height:300px; white-space:pre-wrap; }
.t-g { color:#c3e88d; } .t-r { color:#ff6b6b; } .t-y { color:var(--accent2); }

/* ── FLASH ── */
#flash {
  position:fixed; top:5.5rem; left:50%; transform:translateX(-50%);
  background:var(--bg2); border:1px solid var(--accent2);
  border-radius:4px; padding:.6rem 1.4rem;
  font-family:var(--mono); font-size:.72rem; color:var(--accent2);
  z-index:9000; pointer-events:none; opacity:0; transition:opacity .4s;
  white-space:nowrap;
}
#flash.show { opacity:1; }

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .about-grid,.edu-grid,.exp-grid,.contact-row { grid-template-columns:1fr; }
  .project-row { grid-template-columns:50px 1fr; gap:1.5rem; }
  .project-row.featured { grid-template-columns:50px 1fr; }
  .proj-arrow { display:none; }
  nav { padding:1rem 1.25rem; }
  .nav-right { gap:1.2rem; }
  .nav-link { display:none; }
  .nav-logo { font-size:.68rem; }
  #hero,.section,.section-full { padding-left:1.5rem; padding-right:1.5rem; }
  .contact-inner { padding-left:1.5rem; padding-right:1.5rem; }
  footer { padding-left:1.5rem; padding-right:1.5rem; flex-direction:column; gap:.5rem; align-items:flex-start; }
  .side-links { display:none; }
  .hero-name { letter-spacing:-.03em; }
  .hero-bottom { flex-direction:column; align-items:flex-start; }
  .hero-actions { width:100%; }
  .hero-meta { align-items:flex-start; }
  .section { padding:5rem 1.5rem; }
  .section-full { padding:5rem 1.5rem; }
  .section-full .inner { padding:0; }
  .contact-cta { font-size:clamp(2rem,11vw,4rem); }
}
@media(max-width:520px){
  .marquee-item { padding:0 1.4rem; font-size:.65rem; }
  .proj-title { font-size:1.4rem; }
  .exp-role { font-size:1.5rem; }
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>
<div id="flash"></div>

<!-- Terminal Easter Egg -->
<div id="term-overlay">
  <div class="term-win">
    <div class="term-hdr">
      <div class="tdot" style="background:#ff6b6b" id="t-close"></div>
      <div class="tdot" style="background:#f0a84a"></div>
      <div class="tdot" style="background:#4af0c4"></div>
      <span style="font-family:var(--mono);font-size:.65rem;color:var(--muted);margin-left:.4rem">adrian@portfolio ~ — bash</span>
    </div>
    <div class="term-body" id="term-body"></div>
  </div>
</div>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── translations ─── */
const T = {
  en:{
    nav:['About','Work','Experience','Contact'],
    avail:'Available for opportunities',
    heroDesc:<>Software Engineer based in Madrid. Building <strong>AI-driven systems</strong>, cloud infrastructure and full-stack applications for global enterprises.</>,
    heroDescStr:'Software Engineer based in Madrid. Building AI-driven systems, cloud infrastructure and full-stack applications for global enterprises.',
    cta1:'View Work', cta2:'Download CV',
    loc:'Madrid, Spain', co:'Data & AI Engineer',

/* ─── cursor ─── */
function useCursor(){
  useEffect(()=>{
    const c=document.getElementById('cur'), r=document.getElementById('cur-ring');
    const move=(e)=>{
      c.style.left=e.clientX+'px'; c.style.top=e.clientY+'px';
      setTimeout(()=>{r.style.left=e.clientX+'px';r.style.top=e.clientY+'px';},60);
    };
    const over=(e)=>{
      const hot=e.target.closest('a,button,[data-hover]');
      c.classList.toggle('big',!!hot); r.classList.toggle('big',!!hot);
    };
    window.addEventListener('mousemove',move);
    window.addEventListener('mouseover',over);
    return()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseover',over);};
  },[]);
}

/* ─── reveal ─── */
function useReveal(){
  useEffect(()=>{
    const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in');}),{threshold:0.1});
    document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  },[]);
}

/* ─── typewriter ─── */
function Typewriter({strings,speed=60}){
  const [text,setText]=useState('');
  const [idx,setIdx]=useState(0);
  const [ci,setCi]=useState(0);
  const [del,setDel]=useState(false);
  const [pause,setPause]=useState(false);
  useEffect(()=>{
    if(pause){const t=setTimeout(()=>setPause(false),1600);return()=>clearTimeout(t);}
    const s=strings[idx%strings.length];
    if(!del&&ci<s.length){const t=setTimeout(()=>{setText(s.slice(0,ci+1));setCi(x=>x+1);},speed);return()=>clearTimeout(t);}
    if(!del&&ci===s.length){setPause(true);setDel(true);}
    else if(del&&ci>0){const t=setTimeout(()=>{setText(s.slice(0,ci-1));setCi(x=>x-1);},speed/2.5);return()=>clearTimeout(t);}
    else if(del&&ci===0){setDel(false);setIdx(x=>x+1);}
  },[ci,del,pause,idx]);
  return <>{text}<span style={{display:'inline-block',width:'2px',height:'1em',background:'var(--accent)',verticalAlign:'middle',marginLeft:'3px',animation:'blink 1s step-end infinite'}}/></>;
}

/* hack: expose tweaks div display */
const origCreate=React.createElement;
document.getElementById('tweaks')&&(document.getElementById('tweaks').style.display='block');

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

/* show tweaks when activated */
window.addEventListener('message',e=>{
  const tw=document.getElementById('tweaks');
  if(!tw)return;
  if(e.data?.type==='__activate_edit_mode')tw.style.display='block';
  if(e.data?.type==='__deactivate_edit_mode')tw.style.display='none';
});
